<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>flomo 标签整理仪表盘</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    font-family: -apple-system, BlinkMacSystemFont, "PingFang SC", "SF Pro Display", sans-serif;
    background: #0f0f13;
    color: #e8e8f0;
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    padding: 2rem;
  }

  .card {
    background: #1a1a24;
    border: 1px solid #2a2a3a;
    border-radius: 20px;
    padding: 2.5rem 3rem;
    width: 100%;
    max-width: 520px;
    box-shadow: 0 20px 60px rgba(0,0,0,0.4);
  }

  .header {
    display: flex;
    align-items: center;
    gap: 0.75rem;
    margin-bottom: 2.5rem;
  }

  .dot {
    width: 10px;
    height: 10px;
    border-radius: 50%;
    background: #4ade80;
    box-shadow: 0 0 8px #4ade80;
    animation: pulse 2s infinite;
  }

  @keyframes pulse {
    0%, 100% { opacity: 1; }
    50% { opacity: 0.4; }
  }

  .title {
    font-size: 1rem;
    color: #888;
    letter-spacing: 0.08em;
    text-transform: uppercase;
    font-weight: 500;
  }

  /* 倒计时区域 */
  .countdown-section {
    text-align: center;
    margin-bottom: 2.5rem;
  }

  .countdown-label {
    font-size: 0.8rem;
    color: #555;
    letter-spacing: 0.12em;
    text-transform: uppercase;
    margin-bottom: 1rem;
  }

  .countdown-blocks {
    display: flex;
    justify-content: center;
    gap: 0.75rem;
    margin-bottom: 0.75rem;
  }

  .time-block {
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 0.3rem;
  }

  .time-value {
    font-size: 2.8rem;
    font-weight: 700;
    font-variant-numeric: tabular-nums;
    color: #e8e8f0;
    line-height: 1;
    min-width: 2.6ch;
    text-align: center;
  }

  .time-unit {
    font-size: 0.65rem;
    color: #444;
    letter-spacing: 0.1em;
    text-transform: uppercase;
  }

  .colon {
    font-size: 2.2rem;
    font-weight: 300;
    color: #333;
    margin-top: -0.1rem;
    align-self: flex-start;
    padding-top: 0.15rem;
  }

  .next-time {
    font-size: 0.8rem;
    color: #4a4a6a;
  }

  .next-time span {
    color: #6366f1;
  }

  /* 分割线 */
  .divider {
    border: none;
    border-top: 1px solid #222230;
    margin: 0 0 2rem;
  }

  /* 上次运行 */
  .last-run-section {
    margin-bottom: 0;
  }

  .section-label {
    font-size: 0.7rem;
    color: #444;
    letter-spacing: 0.12em;
    text-transform: uppercase;
    margin-bottom: 1rem;
  }

  .stats-grid {
    display: grid;
    grid-template-columns: 1fr 1fr 1fr;
    gap: 0.75rem;
    margin-bottom: 1.25rem;
  }

  .stat {
    background: #13131c;
    border: 1px solid #22222e;
    border-radius: 12px;
    padding: 0.9rem 0.75rem;
    text-align: center;
  }

  .stat-value {
    font-size: 1.8rem;
    font-weight: 700;
    font-variant-numeric: tabular-nums;
    line-height: 1;
    margin-bottom: 0.35rem;
  }

  .stat-value.green { color: #4ade80; }
  .stat-value.gray  { color: #555; }
  .stat-value.red   { color: #f87171; }

  .stat-label {
    font-size: 0.65rem;
    color: #444;
    letter-spacing: 0.08em;
  }

  .last-run-time {
    font-size: 0.75rem;
    color: #3a3a54;
    text-align: center;
  }

  .last-run-time span {
    color: #4a4a70;
  }
</style>
</head>
<body>

<div class="card">
  <div class="header">
    <div class="dot"></div>
    <div class="title">flomo 标签整理</div>
  </div>

  <div class="countdown-section">
    <div class="countdown-label">下次自动整理</div>
    <div class="countdown-blocks">
      <div class="time-block">
        <div class="time-value" id="days">--</div>
        <div class="time-unit">天</div>
      </div>
      <div class="colon">:</div>
      <div class="time-block">
        <div class="time-value" id="hours">--</div>
        <div class="time-unit">时</div>
      </div>
      <div class="colon">:</div>
      <div class="time-block">
        <div class="time-value" id="minutes">--</div>
        <div class="time-unit">分</div>
      </div>
      <div class="colon">:</div>
      <div class="time-block">
        <div class="time-value" id="seconds">--</div>
        <div class="time-unit">秒</div>
      </div>
    </div>
    <div class="next-time" id="next-time-str">计算中...</div>
  </div>

  <hr class="divider">

  <div class="last-run-section">
    <div class="section-label">上次运行</div>
    <div class="stats-grid">
      <div class="stat">
        <div class="stat-value green" id="stat-updated">—</div>
        <div class="stat-label">已打标</div>
      </div>
      <div class="stat">
        <div class="stat-value gray" id="stat-skipped">—</div>
        <div class="stat-label">已有标签</div>
      </div>
      <div class="stat">
        <div class="stat-value red" id="stat-failed">—</div>
        <div class="stat-label">失败</div>
      </div>
    </div>
    <div class="last-run-time">运行时间：<span id="last-run-time">加载中...</span></div>
  </div>
</div>

<script>
// ── 计算下一个周一 09:07 ──────────────────────────────────────────
function nextMonday0907() {
  const now = new Date();
  const target = new Date(now);
  // 周一 = 1，当前weekday
  const day = now.getDay(); // 0=Sun,1=Mon,...6=Sat
  let daysUntilMonday = (day === 1) ? 0 : (8 - day) % 7;

  target.setDate(now.getDate() + daysUntilMonday);
  target.setHours(9, 7, 0, 0);

  // 如果已经过了今天的周一09:07，加7天
  if (target <= now) {
    target.setDate(target.getDate() + 7);
  }
  return target;
}

function pad(n) { return String(n).padStart(2, '0'); }

function updateCountdown() {
  const next = nextMonday0907();
  const now = new Date();
  const diff = next - now;

  if (diff <= 0) { location.reload(); return; }

  const totalSec = Math.floor(diff / 1000);
  const days    = Math.floor(totalSec / 86400);
  const hours   = Math.floor((totalSec % 86400) / 3600);
  const minutes = Math.floor((totalSec % 3600) / 60);
  const seconds = totalSec % 60;

  document.getElementById('days').textContent    = days;
  document.getElementById('hours').textContent   = pad(hours);
  document.getElementById('minutes').textContent = pad(minutes);
  document.getElementById('seconds').textContent = pad(seconds);

  const fmt = next.toLocaleDateString('zh-CN', {
    month: 'numeric', day: 'numeric', weekday: 'short'
  }) + ' 09:07';
  document.getElementById('next-time-str').innerHTML =
    `下次：<span>${fmt}</span>`;
}

// ── 读取状态文件（需本地 HTTP 服务，否则显示内嵌数据）─────────────
async function loadStatus() {
  // 尝试通过相对路径加载（本地 HTTP 服务器场景）
  try {
    const resp = await fetch('flomo_status.json', { cache: 'no-store' });
    if (resp.ok) {
      const s = await resp.json();
      applyStatus(s);
      return;
    }
  } catch(_) {}

  // 回退：显示提示
  document.getElementById('stat-updated').textContent  = '?';
  document.getElementById('stat-skipped').textContent  = '?';
  document.getElementById('stat-failed').textContent   = '?';
  document.getElementById('last-run-time').textContent = '请用本地服务器打开以读取数据';
}

function applyStatus(s) {
  document.getElementById('stat-updated').textContent  = s.updated  ?? '—';
  document.getElementById('stat-skipped').textContent  = s.skipped  ?? '—';
  document.getElementById('stat-failed').textContent   = s.failed   ?? '—';
  document.getElementById('last-run-time').textContent = s.last_run  ?? '—';
  // 失败为0时用灰色
  if ((s.failed ?? 0) === 0) {
    document.getElementById('stat-failed').className = 'stat-value gray';
  }
}

// ── 启动 ──────────────────────────────────────────────────────────
updateCountdown();
setInterval(updateCountdown, 1000);
loadStatus();
</script>
</body>
</html>
